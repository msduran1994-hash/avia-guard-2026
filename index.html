ple":false},{"severity":"alto","metadata":null,"auditor":"Hilary Basto","description":"durante el recorrido por la granja se evidencia que los galpones 5 y 6 no cuentan con luz, debido al corto que se tiene en la granja, adicional muchos de los cables de luz se encuentran   dentro de las ramas de los arboles, lo que ocasionan que  parte de la granja quede sin luz, sobre todo en temporada de lluvia, adicional se evidencia que  ninguno de los ventiladores que se tienen instalados en la granja se encuentran en funcionamiento, tampoco se cuentan con  nidos suficientes, ya que en algunos galpones solo cuentan con tres nidos cuando se deberían tener 6 por galpón.","evidence_urls":[],"title":"Galpones 5 y 6 sin Luz","farm_type":"Propia","follow_up":"","commitment_date":"","audit_id":"","farm_operative_type":"Reproductora","risk_types":["Riesgo Operativo"],"action_plan":"","observations":"","responsible":"","category":"Estructural / Equipos","visit_date":"2026-04-24","farm_id":"6a0b49556d62eafe39faadb5","farm_name":"Buenos Aires","status":"abierto","id":"6a0c60b4b0c9a20e166dbf70","created_date":"2026-05-19T13:08:04.148000","updated_date":"2026-05-20T12:32:08.931000","created_by_id":"6a0a53866b4d272c3b1d474b","created_by":"msduran1994@gmail.com","is_sample":false},{"severity":"alto","metadata":null,"auditor":"Hilary Basto","description":"Se indica por parte del administrador que no se están enviando insumos básicos, necesarios y recurrentes a granja como lo es el jabonen en polvo y el desinfectante familyguart o en ocasiones llegan los insumos después de finalizada cierta etapa y no cuando realmente se necesita;la granja solo cuenta con 4 extintores, los cuales debido al tamaño y la distancia entre galpones no son suficientes en caso de presentarse algún siniestro o conato de incendio.","evidence_urls":[],"title":"No envio de Insumos Basicos","farm_type":"Propia","follow_up":"","commitment_date":"","audit_id":"","farm_operative_type":"Reproductora","risk_types":["Riesgo Operativo","Riesgo Reputacional"],"action_plan":"","observations":"","responsible":"","category":"Alimento / Insumos","visit_date":"2026-04-24","farm_id":"6a0b49556d62eafe39faadb5","farm_name":"Buenos Aires","status":"abierto","id":"6a0c60659c708f2db15a7d17","created_date":"2026-05-19T13:06:45.596000","updated_date":"2026-05-20T12:32:25.281000","created_by_id":"6a0a53866b4d272c3b1d474b","created_by":"msduran1994@gmail.com","is_sample":false},{"severity":"alto","metadata":null,"auditor":"Hilary Basto","description":" se evidencia que la recolección y almacenamiento de huevo, se estaba realizando en  baldes, debido a que no se  contaban con las bandejas necesarias para el almacenamiento, según la información proporcionada por el administrador  esto fue autorizado por el director y técnico, debido a que la postura del ave se adelanto y no se tenia previsto, sin embargo el día de la visita llegaron bandejas por parte de aviagen pero  no la cantidad suficiente para la operación.","evidence_urls":[],"title":"Mal Manejo de los Huevos","farm_type":"Propia","follow_up":"","commitment_date":"","audit_id":"","farm_operative_type":"Reproductora","risk_types":["Riesgo Financiero","Riesgo Operativo"],"action_plan":"","observations":"","responsible":"","category":"Operativo","visit_date":"2026-04-24","farm_id":"6a0b49556d62eafe39faadb5","farm_name":"Buenos Aires","status":"abierto","id":"6a0c6015d124870cc356004a","created_date":"2026-05-19T13:05:25.008000","updated_date":"2026-05-20T12:32:36.339000","created_by_id":"6a0a53866b4d272c3b1d474b","created_by":"msduran1994@gmail.com","is_sample":false},{"severity":"critico","metadata":null,"auditor":"Hilary Basto","description":"segun la información recolectada en la visita de auditoria se evidencia que el porcentaje de mortalidad de la granja de encuentra en un 11,29%, el cual se evidencia que presento un aumento significativo en lo corrido de este año evidenciado en el descarte de  1693 picos el dia 19/03/2026, si bien es cierto que este resultado  es la acumulacion  de  4 meses es alta, comparando el descarte realizado el 4-04-2026  de 257 aves en menos de un mes, por lo que dentro del recorrido se evidenciaron varios posibles focos que pueden provocar mortalidad, como lo son la falta de botas negras para realizar el recorrido fuera de los galpones, el cual incumple el procedimiento actual ejecutado, maleza crecida al rededor de los galpones, no funcionamiento de los ventiladores debido a la falta de luz y mantenimiento de los mismos, falta de arco o bomba de desinfeccion  en el galpon #1, ya que el camino por donde transita el vehiculo de savicol es via publica  por donde transitan vehiculos particulares y animales de diversas especies, recorridos extensos internos por dentro de la granja por trochas, transito constante  serca del compost por los colaboradores y cercania del mismo a los galpones, retrazo de dos meses en los envio de los insumos por parte de almacen a la granja, ya que en ocasiones llegan cuando ya se ha finalizado la etapa ","evidence_urls":[],"title":"Alto Indice de Mortalidad","farm_type":"Propia","follow_up":"","commitment_date":"","audit_id":"","farm_operative_type":"Reproductora","risk_types":["Riesgo Operativo","Riesgo Reputacional"],"action_plan":"","observations":"","responsible":"","category":"Mortalidad","visit_date":"2026-04-24","farm_id":"6a0b49556d62eafe39faadb5","farm_name":"Buenos Aires","status":"abierto","id":"6a0c5fbcbec35124357286a0","created_date":"2026-05-19T13:03:56.238000","updated_date":"2026-05-20T12:32:45.807000","created_by_id":"6a0a53866b4d272c3b1d474b","created_by":"msduran1994@gmail.com","is_sample":false},{"severity":"medio","metadata":null,"auditor":"Hilary Basto","description":"según la información proporcionada por el administrador y los colaboradores, se implemento el protocolo de uso de botas negras fuera del galpón y amarillas dentro del galpón, sin embargo la cantidad de botas negras disponibles son mínimas y no alcanzan para todos los colaboradores ni las visitas que ingresan a granja; no se encuentran  del todo conformes con la dotación, debido a que  cuando se solicita una dotación se envían las tallas del colaborador, sin embargo en ocasiones se han enviado tallas mas pequeñas, motivo por el cual deben esperar mas tiempo para su cambio.","evidence_urls":[],"title":"Protocolo uso de Botas Negras","farm_type":"Propia","follow_up":"","commitment_date":"","audit_id":"","farm_operative_type":"Reproductora","risk_types":["Riesgo Operativo"],"action_plan":"","observations":"","responsible":"","category":"Operativo","visit_date":"2026-04-24","farm_id":"6a0b49556d62eafe39faadb5","farm_name":"Buenos Aires","status":"abierto","id":"6a0c5f72a6f0499307c30b1b","created_date":"2026-05-19T13:02:42.117000","updated_date":"2026-05-20T12:32:54.451000","created_by_id":"6a0a53866b4d272c3b1d474b","created_by":"msduran1994@gmail.com","is_sample":false},{"severity":"alto","metadata":null,"auditor":"Hilary Basto","description":"durante el recorrido de evidencio que el cuarto frio para el almacenamiento de los huevos se está usando por el momento como bodega de insumos mientras se inicia la postura, sin embargo, no se cuenta con un bodega que se pueda usar como cuarto de insumos que quede cerca a la entrada principal en la que se puedan custodiar y controlar los insumos; tambien  se evidencia que dentro del cuarto frio se presenta un corto circuito en la única toma, el cual afecta la luz de la bodega y por ende su buen funcionamiento, por lo que las neveras que se encuentran con vacunas dentro de la bodega deben ser conectadas a través de una extensión que proviene desde la vivienda del administrador.","evidence_urls":[],"title":"Almacenamiento de Huevos","farm_type":"Propia","follow_up":"","commitment_date":"","audit_id":"","farm_operative_type":"Reproductora","risk_types":["Riesgo Financiero"],"action_plan":"","observations":"","responsible":"","category":"Estructural / Equipos","visit_date":"2026-04-24","farm_id":"6a0b4955 function severityColor(s) {
  if (!s) return 'gray';
  const sl = s.toLowerCase();
  if (sl === 'critico' || sl === 'crítico') return 'red';
  if (sl === 'alto') return 'orange';
  if (sl === 'medio') return 'yellow';
  if (sl === 'bajo') return 'green';
  return 'gray';
}
function severityLabel(s) {
  if (!s) return '—';
  const sl = s.toLowerCase();
  if (sl === 'critico' || sl === 'crítico') return 'Crítico';
  if (sl === 'alto') return 'Alto';
  if (sl === 'medio') return 'Medio';
  if (sl === 'bajo') return 'Bajo';
